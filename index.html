<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonali Lifestyle Design Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8f8f8;
}

/* Header */
header {
    background: #ff4d6d;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Navbar */
nav {
    background: #333;
    padding: 10px;
    text-align: center;
}
nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

/* Banner */
.banner {
    background: url('https://via.placeholder.com/1200x400') no-repeat center;
    background-size: cover;
    height: 300px;
}

/* Products */
.container {
    padding: 20px;
}
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.card img {
    width: 100%;
    border-radius: 10px;
}
button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

/* Footer */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h1>My Dress Store 👗</h1>
    <p>Latest Collection for Women</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="banner"></div>

<div class="container">
    <h2>Our Dresses</h2>

    <div class="products">

        <!-- Product 1 -->
        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Stylish Kurti</h3>
            <p>₹499</p>
            <a href="https://wa.me/9337254663">
                <button>Order Now</button>
            </a>
        </div>

        <!-- Product 2 -->
        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Party Wear Dress</h3>
            <p>₹899</p>
            <a href="https://wa.me/9337254663">
                <button>Order Now</button>
            </a>
        </div>

        <!-- Product 3 -->
        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Cotton Kurti</h3>
            <p>₹599</p>
            <a href="https://wa.me/9337254663">
                <button>Order Now</button>
            </a>
        </div>

        <!-- Product 4 -->
        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Designer Gown</h3>
            <p>₹1299</p>
            <a href="https://wa.me/9337254663">
                <button>Order Now</button>
            </a>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 My Dress Store | Contact: +91 9337254663</p>
</footer>

</body>
</html>
